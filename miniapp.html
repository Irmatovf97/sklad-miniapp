<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sklad Qabul</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #21253a;
    --accent: #4f8ef7;
    --accent2: #38d9a9;
    --danger: #ff6b6b;
    --warn: #ffa94d;
    --text: #e8eaf0;
    --text2: #8890a8;
    --border: #2d3350;
    --radius: 14px;
    --font: 'Golos Text', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 40px;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a2a4a 0%, #0f1117 100%);
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-icon {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-sub   { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* EKRANLAR */
  .screen { display: none; padding: 20px; animation: fadeIn .3s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

  /* TIL TANLASH */
  .lang-grid {
    display: grid; grid-template-columns: 1fr;
    gap: 12px; margin-top: 24px;
  }
  .lang-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: all .2s;
  }
  .lang-btn:active { transform: scale(.97); }
  .lang-btn:hover  { border-color: var(--accent); background: var(--card2); }
  .lang-flag { font-size: 32px; }
  .lang-name { font-size: 17px; font-weight: 600; }
  .lang-sub  { font-size: 13px; color: var(--text2); margin-top: 2px; }

  /* STATUS EKRAN */
  .status-card {
    background: var(--card);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    margin-top: 20px;
    border: 1px solid var(--border);
  }
  .status-icon { font-size: 56px; margin-bottom: 16px; }
  .status-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .status-text  { font-size: 15px; color: var(--text2); line-height: 1.6; }

  .info-row {
    background: var(--card2);
    border-radius: 10px;
    padding: 12px 16px;
    margin: 12px 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .info-label { font-size: 13px; color: var(--text2); }
  .info-val   { font-size: 15px; font-weight: 600; }

  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    margin-top: 8px;
  }
  .badge-green  { background: rgba(56,217,169,.15); color: var(--accent2); }
  .badge-warn   { background: rgba(255,169,77,.15);  color: var(--warn); }
  .badge-danger { background: rgba(255,107,107,.15); color: var(--danger); }

  /* FORMA */
  .form-title {
    font-size: 17px; font-weight: 700;
    margin: 0 0 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 13px; color: var(--text2);
    margin-bottom: 6px; display: block;
  }
  .form-input, .form-select {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
    appearance: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: #1a1d27; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* TUGMALAR */
  .btn {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-family: var(--font);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    margin-top: 6px;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent);  color: #fff; }
  .btn-success { background: var(--accent2); color: #0f1117; }
  .btn-danger  { background: var(--danger);  color: #fff; }
  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text2);
  }

  /* QIDIRUV */
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap input { padding-left: 42px; }
  .search-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 16px; opacity: .5;
  }

  /* LOADER */
  .loader {
    display: flex; align-items: center; justify-content: center;
    padding: 40px; gap: 8px;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce .8s infinite alternate;
  }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { from { opacity:.3; transform:translateY(0); } to { opacity:1; transform:translateY(-8px); } }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #2d3350; color: var(--text);
    padding: 12px 20px; border-radius: 10px;
    font-size: 14px; font-weight: 500;
    opacity: 0; transition: opacity .3s;
    pointer-events: none; z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-icon">🏭</div>
  <div>
    <div class="header-title" id="headerTitle">Sklad Tizimi</div>
    <div class="header-sub" id="headerSub">Postavshik qabul</div>
  </div>
</div>

<!-- EKRAN 1: TIL TANLASH -->
<div class="screen active" id="screenLang">
  <div style="margin-top:8px; color:var(--text2); font-size:14px;" id="langPrompt">Tilni tanlang / Выберите язык</div>
  <div class="lang-grid">
    <div class="lang-btn" onclick="setLang('uz_latn')">
      <span class="lang-flag">🇺🇿</span>
      <div>
        <div class="lang-name">O'zbek tili</div>
        <div class="lang-sub">Lotin yozuvi</div>
      </div>
    </div>
    <div class="lang-btn" onclick="setLang('uz_krill')">
      <span class="lang-flag">🇺🇿</span>
      <div>
        <div class="lang-name">Ўзбек тили</div>
        <div class="lang-sub">Кирилл ёзуви</div>
      </div>
    </div>
    <div class="lang-btn" onclick="setLang('ru')">
      <span class="lang-flag">🇷🇺</span>
      <div>
        <div class="lang-name">Русский язык</div>
        <div class="lang-sub">Кириллица</div>
      </div>
    </div>
  </div>
</div>

<!-- EKRAN 2: KONTRAGENT QIDIRISH -->
<div class="screen" id="screenSearch">
  <div class="form-title">🔍 <span id="lbl_kontragent_title">Kontragent</span></div>
  <div class="search-wrap">
    <span class="search-icon">🔎</span>
    <input class="form-input" id="inputKontragent" type="text"
      placeholder="Firma nomini kiriting..."
      oninput="onKontragentInput(this.value)">
  </div>
  <div id="searchResults"></div>
  <button class="btn btn-primary" onclick="checkKontragent()" id="btnCheck">
    ✅ <span id="lbl_tekshir">Tekshirish</span>
  </button>
</div>

<!-- EKRAN 3: STATUS (kech qoldi, topilmadi, ruxsat) -->
<div class="screen" id="screenStatus">
  <div id="statusContent"></div>
  <button class="btn btn-outline" onclick="goBack()" id="btnBack" style="margin-top:16px">
    ← <span id="lbl_orqaga">Orqaga</span>
  </button>
</div>

<!-- EKRAN 4: FORMA -->
<div class="screen" id="screenForm">
  <div class="form-title">📋 <span id="lbl_forma_title">Ma'lumotlarni kiriting</span></div>

  <!-- Mashina -->
  <div class="form-group">
    <label class="form-label" id="lbl_mashina_raqam">🚗 Mashina raqami</label>
    <input class="form-input" id="fMashinaRaqam" type="text" placeholder="01 A 123 BC">
  </div>
  <div class="form-group">
    <label class="form-label" id="lbl_mashina_marka">🚘 Mashina markasi</label>
    <select class="form-select" id="fMashinaMarka">
      <option value="">— Tanlang —</option>
      <option>Nexia</option><option>Damas</option><option>Spark</option>
      <option>Matiz</option><option>Cobalt</option><option>Tracker</option>
      <option>Malibu</option><option>Lacetti</option><option>Captiva</option>
      <option>Gentra</option><option>Equinox</option>
      <option>Kamaz</option><option>MAN</option><option>Volvo</option>
      <option>Mercedes Sprinter</option><option>Ford Transit</option>
      <option>Isuzu</option><option>Hyundai HD</option>
    </select>
  </div>

  <div class="divider"></div>

  <!-- Tovar -->
  <div class="form-group">
    <label class="form-label" id="lbl_tovar_turi">📦 Tovar turi</label>
    <select class="form-select" id="fTovarTuri">
      <option value="">— Tanlang —</option>
    </select>
  </div>
  <div class="row2">
    <div class="form-group">
      <label class="form-label" id="lbl_miqdor">⚖️ Miqdor</label>
      <input class="form-input" id="fMiqdor" type="number" placeholder="0">
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl_olchov">📏 O'lchov</label>
      <select class="form-select" id="fOlchov">
        <option>kg</option><option>tonna</option><option>litr</option>
        <option>dona</option><option>qop</option><option>korobka</option>
        <option>paket</option><option>m²</option>
      </select>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Chiqishda -->
  <div class="form-group">
    <label class="form-label" id="lbl_chiqish">📤 Chiqishda qoladi (mashina bo'sh chiqishi uchun)</label>
    <div class="row2">
      <input class="form-input" id="fChiqishQoldiq" type="number" placeholder="0">
      <select class="form-select" id="fChiqishOlchov">
        <option>kg</option><option>tonna</option><option>litr</option>
        <option>dona</option><option>qop</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label" id="lbl_izoh">💬 Izoh (ixtiyoriy)</label>
    <input class="form-input" id="fIzoh" type="text" placeholder="...">
  </div>

  <button class="btn btn-success" onclick="submitForm()" id="btnSubmit">
    ✅ <span id="lbl_yuborish">Yuborish</span>
  </button>
</div>

<!-- EKRAN 5: MUVAFFAQIYAT -->
<div class="screen" id="screenSuccess">
  <div class="status-card">
    <div class="status-icon">✅</div>
    <div class="status-title" id="lbl_success_title">Muvaffaqiyatli!</div>
    <div class="status-text" id="lbl_success_text">Ma'lumotlar saqlandi</div>
    <div id="successDetails" style="margin-top:16px"></div>
  </div>
</div>

<!-- LOADER -->
<div class="loader" id="globalLoader" style="display:none">
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// SOZLAMALAR
// ============================================================
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwrWLkzP49KbyaDb0Q22bKVJjkkJzzX4UxvaBv9yIvL3N95B4MzxBXfk8MtDtvObYj9Ag/exec"; // ← deployment URL

// ============================================================
// TARJIMALAR
// ============================================================
const T = {
  uz_latn: {
    header: "Sklad Tizimi", headerSub: "Postavshik qabul",
    kontragent_title: "Kontragentni kiriting",
    tekshir: "Tekshirish", orqaga: "Orqaga",
    forma_title: "Ma'lumotlarni kiriting",
    mashina_raqam: "🚗 Mashina raqami", mashina_marka: "🚘 Mashina markasi",
    tovar_turi: "📦 Tovar turi", miqdor: "⚖️ Miqdor", olchov: "📏 O'lchov",
    chiqish: "📤 Chiqishda qoladi", izoh: "💬 Izoh (ixtiyoriy)",
    yuborish: "Yuborish",
    success_title: "Muvaffaqiyatli!", success_text: "Ma'lumotlar saqlandi va yozildi",
    placeholder_kontragent: "Firma nomini kiriting...",
    status_erta: "Siz belgilangan vaqtdan oldin kelgansiz",
    status_vaqtida: "Vaqtida kelgansiz! Formani to'ldiring",
    status_kech: "Kech qoldingiz! Admin ruxsati so'raldi",
    status_kutilmoqda: "Ruxsat so'rovi yuborilgan, admin javobini kuting",
    status_rad: "Kirishingiz rad etildi",
    status_topilmadi: "Siz bugungi jadvalda topilmadingiz",
    status_done: "Bu postavka allaqachon qabul qilingan",
    ruxsat_berildi: "Admin ruxsat berdi! Formani to'ldiring",
    kechikish: "Kechikish",
    daqiqa: "daqiqa",
    kelish_vaqti: "Kelish vaqti",
    firma: "Firma",
  },
  uz_krill: {
    header: "Склад Тизими", headerSub: "Поставщик қабул",
    kontragent_title: "Контрагентни киритинг",
    tekshir: "Текшириш", orqaga: "Орқага",
    forma_title: "Маълумотларни киритинг",
    mashina_raqam: "🚗 Машина рақами", mashina_marka: "🚘 Машина маркаси",
    tovar_turi: "📦 Товар тури", miqdor: "⚖️ Миқдор", olchov: "📏 Ўлчов",
    chiqish: "📤 Чиқишда қолади", izoh: "💬 Изоҳ (ихтиёрий)",
    yuborish: "Юбориш",
    success_title: "Муваффақиятли!", success_text: "Маълумотлар сақланди",
    placeholder_kontragent: "Фирма номини киритинг...",
    status_erta: "Сиз белгиланган вақтдан олдин келгансиз",
    status_vaqtida: "Вақтида келгансиз! Формани тўлдиринг",
    status_kech: "Кеч қолдингиз! Админ рухсати сўралди",
    status_kutilmoqda: "Рухсат сўрови юборилган, админ жавобини кутинг",
    status_rad: "Киришингиз рад этилди",
    status_topilmadi: "Сиз бугунги жадвалда топилмадингиз",
    status_done: "Бу поставка аллақачон қабул қилинган",
    ruxsat_berildi: "Админ рухсат берди! Формани тўлдиринг",
    kechikish: "Кечикиш", daqiqa: "дақиқа",
    kelish_vaqti: "Келиш вақти", firma: "Фирма",
  },
  ru: {
    header: "Склад Система", headerSub: "Приём поставщика",
    kontragent_title: "Введите контрагента",
    tekshir: "Проверить", orqaga: "Назад",
    forma_title: "Введите данные",
    mashina_raqam: "🚗 Номер машины", mashina_marka: "🚘 Марка машины",
    tovar_turi: "📦 Вид товара", miqdor: "⚖️ Количество", olchov: "📏 Единица",
    chiqish: "📤 Остаток на выезде", izoh: "💬 Примечание (необяз.)",
    yuborish: "Отправить",
    success_title: "Успешно!", success_text: "Данные сохранены",
    placeholder_kontragent: "Введите название фирмы...",
    status_erta: "Вы приехали раньше назначенного времени",
    status_vaqtida: "Вы приехали вовремя! Заполните форму",
    status_kech: "Вы опоздали! Запрос на разрешение отправлен",
    status_kutilmoqda: "Запрос отправлен, ожидайте ответа администратора",
    status_rad: "Ваш въезд отклонён",
    status_topilmadi: "Вы не найдены в сегодняшнем расписании",
    status_done: "Эта поставка уже была принята",
    ruxsat_berildi: "Администратор разрешил! Заполните форму",
    kechikish: "Опоздание", daqiqa: "мин",
    kelish_vaqti: "Время прибытия", firma: "Фирма",
  }
};

// ============================================================
// STATE
// ============================================================
let lang = "uz_latn";
let currentSupplierData = null;
let spravochnik = [];

// ============================================================
// TELEGRAM WEBAPP
// ============================================================
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor("#0f1117");
  tg.setBackgroundColor("#0f1117");
}

// ============================================================
// TIL
// ============================================================
function setLang(l) {
  lang = l;
  applyLang();
  showScreen("screenSearch");
  loadSpravochnik();
}

function applyLang() {
  const t = T[lang];
  document.getElementById("headerTitle").textContent = t.header;
  document.getElementById("headerSub").textContent   = t.headerSub;
  document.getElementById("lbl_kontragent_title").textContent = t.kontragent_title;
  document.getElementById("lbl_tekshir").textContent  = t.tekshir;
  document.getElementById("lbl_orqaga").textContent   = t.orqaga;
  document.getElementById("lbl_forma_title").textContent = t.forma_title;
  document.getElementById("lbl_mashina_raqam").textContent = t.mashina_raqam;
  document.getElementById("lbl_mashina_marka").textContent = t.mashina_marka;
  document.getElementById("lbl_tovar_turi").textContent = t.tovar_turi;
  document.getElementById("lbl_miqdor").textContent = t.miqdor;
  document.getElementById("lbl_olchov").textContent = t.olchov;
  document.getElementById("lbl_chiqish").textContent = t.chiqish;
  document.getElementById("lbl_izoh").textContent   = t.izoh;
  document.getElementById("lbl_yuborish").textContent = t.yuborish;
  document.getElementById("inputKontragent").placeholder = t.placeholder_kontragent;
}

// ============================================================
// SPRAVOCHNIK
// ============================================================
async function loadSpravochnik() {
  try {
    const res = await api({ action: "get_spravochnik" });
    spravochnik = res.tovarlar || [];
    const sel = document.getElementById("fTovarTuri");
    sel.innerHTML = '<option value="">— —</option>';
    spravochnik.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t.nom;
      opt.textContent = `${t.nom} (${t.olchov})`;
      sel.appendChild(opt);
    });
    // O'lchov avtomatik
    sel.onchange = () => {
      const found = spravochnik.find(t => t.nom === sel.value);
      if (found) document.getElementById("fOlchov").value = found.olchov;
    };
  } catch(e) { console.log("Spravochnik yuklanmadi", e); }
}

// ============================================================
// KONTRAGENT TEKSHIRISH
// ============================================================
function onKontragentInput(val) {
  document.getElementById("searchResults").innerHTML = "";
}

async function checkKontragent() {
  const val = document.getElementById("inputKontragent").value.trim();
  if (!val) { showToast("⚠️ " + (lang === "ru" ? "Введите название" : "Nomni kiriting")); return; }

  showLoader(true);
  try {
    const res = await api({ action: "check_supplier", kontragent: val });
    showLoader(false);
    handleSupplierResult(res);
  } catch(e) {
    showLoader(false);
    showToast("❌ Xatolik: " + e.message);
  }
}

function handleSupplierResult(res) {
  const t = T[lang];
  currentSupplierData = res;

  if (res.holat === "topilmadi") {
    showStatusScreen("❌", t.status_topilmadi, "danger", res);
    return;
  }
  if (res.holat === "already_done") {
    showStatusScreen("✅", t.status_done, "green", res);
    return;
  }
  if (res.holat === "rad_etildi") {
    showStatusScreen("🚫", t.status_rad, "danger", res);
    return;
  }
  if (res.holat === "ruxsat_kutilmoqda") {
    showStatusScreen("⏳", t.status_kutilmoqda, "warn", res);
    return;
  }
  if (res.holat === "kech_qoldi") {
    showStatusScreen("⏰", t.status_kech, "warn", res);
    return;
  }
  if (res.holat === "ruxsat_berildi") {
    showToast("✅ " + t.ruxsat_berildi);
    showFormScreen(res);
    return;
  }
  // erta yoki vaqtida
  showFormScreen(res);
}

function showStatusScreen(icon, text, type, res) {
  const t = T[lang];
  let html = `
    <div class="status-card">
      <div class="status-icon">${icon}</div>
      <div class="status-title">${text}</div>`;

  if (res.firma) {
    html += `<div class="info-row"><span class="info-label">${t.firma}</span><span class="info-val">${res.firma}</span></div>`;
  }
  if (res.vaqt) {
    html += `<div class="info-row"><span class="info-label">${t.kelish_vaqti}</span><span class="info-val">${res.vaqt}</span></div>`;
  }
  if (res.kechikish_daqiqa) {
    html += `<div class="info-row"><span class="info-label">${t.kechikish}</span><span class="info-val" style="color:var(--warn)">${res.kechikish_daqiqa} ${t.daqiqa}</span></div>`;
  }
  if (res.qolgan_daqiqa) {
    html += `<div class="info-row"><span class="info-label">⏳ Vaqt qoldi</span><span class="info-val" style="color:var(--accent2)">${res.qolgan_daqiqa} ${t.daqiqa}</span></div>`;
  }

  html += `</div>`;
  document.getElementById("statusContent").innerHTML = html;
  showScreen("screenStatus");
}

function showFormScreen(res) {
  showScreen("screenForm");
  showToast("✅ " + T[lang].status_vaqtida);
}

// ============================================================
// FORMA YUBORISH
// ============================================================
async function submitForm() {
  const mashinaRaqam = document.getElementById("fMashinaRaqam").value.trim();
  const mashinaMarka = document.getElementById("fMashinaMarka").value;
  const tovarTuri    = document.getElementById("fTovarTuri").value;
  const miqdor       = document.getElementById("fMiqdor").value;
  const olchov       = document.getElementById("fOlchov").value;
  const chiqishQoldiq= document.getElementById("fChiqishQoldiq").value;
  const chiqishOlchov= document.getElementById("fChiqishOlchov").value;
  const izoh         = document.getElementById("fIzoh").value;

  if (!mashinaRaqam || !tovarTuri || !miqdor) {
    showToast("⚠️ " + (lang === "ru" ? "Заполните обязательные поля" : "Majburiy maydonlarni to'ldiring"));
    return;
  }

  const tgUser = tg?.initDataUnsafe?.user;
  const operatorNom = tgUser ? `${tgUser.first_name || ""} ${tgUser.last_name || ""}`.trim() : "Mini App";

  showLoader(true);
  try {
    const res = await api({
      action: "save_kirim",
      postavka_raqam: currentSupplierData?.raqam || "",
      kontragent:     currentSupplierData?.firma || "",
      shartnoma:      currentSupplierData?.shartnoma || "",
      mashina_raqam:  mashinaRaqam.toUpperCase(),
      mashina_marka:  mashinaMarka,
      tovar_turi:     tovarTuri,
      miqdor:         parseFloat(miqdor) || 0,
      olchov,
      chiqish_qoldiq: parseFloat(chiqishQoldiq) || 0,
      chiqish_olchov: chiqishOlchov,
      izoh,
      operator:       operatorNom,
      til:            lang,
    });
    showLoader(false);

    if (res.success) {
      document.getElementById("lbl_success_title").textContent = T[lang].success_title;
      document.getElementById("lbl_success_text").textContent  = T[lang].success_text;
      document.getElementById("successDetails").innerHTML = `
        <div class="info-row"><span class="info-label">🆔 ID</span><span class="info-val">#${res.id}</span></div>
        <div class="info-row"><span class="info-label">🏢</span><span class="info-val">${currentSupplierData?.firma || ""}</span></div>
        <div class="info-row"><span class="info-label">📦</span><span class="info-val">${tovarTuri}: ${miqdor} ${olchov}</span></div>
      `;
      showScreen("screenSuccess");
      if (tg) setTimeout(() => tg.close(), 3000);
    } else {
      showToast("❌ " + (res.error || "Xatolik"));
    }
  } catch(e) {
    showLoader(false);
    showToast("❌ " + e.message);
  }
}

// ============================================================
// YORDAMCHILAR
// ============================================================
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goBack() {
  showScreen("screenSearch");
}

function showLoader(show) {
  document.getElementById("globalLoader").style.display = show ? "flex" : "none";
}

function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3000);
}

async function api(data) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: { "Content-Type": "text/plain" }
  });
  return res.json();
}
